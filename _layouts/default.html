---
layout: default
---
<!DOCTYPE html>
<html lang="en-us">
  {% assign hash = site.time | date: '%s' %}
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="theme-color" content="{{ site.theme-color }}" />
    <meta property="og:type" content="website" />

    <title>{% if page.title %}{{ page.title }} &sdot; {% endif %}{{ site.title }}</title>
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta itemprop="name" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />

    <meta itemprop="logo" content="{{ '/images/icon.svg' | prepend: site.baseurl | prepend: site.url }}" />
    <link rel="icon" href="{{ '/images/icon.svg' | prepend: site.baseurl | prepend: site.url }}" type="image/svg+xml">

    <meta property="og:image" content="{{ site.card | prepend: site.baseurl | prepend: site.url | append: '?v=' | append: hash }}" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="960" />
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{ site.card | prepend: site.baseurl | prepend: site.url | append: '?v=' | append: hash }}">

    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <meta itemprop="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="me" href="{{ site.mastodon.url }}" />
    <meta name="fediverse:creator" content="{{ site.mastodon.handle }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" media="all" href="{{ 'style.css' | append: '?v=' | append: hash }}">
  </head>
  <body>
    <header>
      <nav>
        <a href="https://roost.tools">← ROOST.tools main site</a>
        <a href="https://github.com/roostorg/playground" class="button">Source Code</a>
      </nav>
    </header>
    <main>
      {{ content }}
    </main>
  </body>
</html>
